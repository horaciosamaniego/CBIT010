<h1 id="de-la-semana-pasada">De la semana pasada</h1>
<ul>
<li>Cada carácter cuesta <strong>8 bits</strong> en ASCII</li>
<li>Un libro de 500 páginas → millones de bits</li>
</ul>
<p><strong>Pregunta de hoy:</strong> ¿Se puede ser más eficiente? ¿Hay letras que necesiten menos bits que otras?</p>
<p><strong>Respuesta:</strong> Sí. Y hay una teoría que nos dice exactamente cuántos bits necesita cada mensaje.</p>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>
</section>

<h1 id="%F0%9F%AA%99-experimento-1-la-moneda"><img class="emoji" draggable="false" alt="🪙" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1fa99.svg" data-marp-twemoji=""/> Experimento 1: La moneda</h1>
<p>Voy a lanzar esta moneda. <strong>¿Cuánta información da el resultado?</strong></p>
<ul>
<li>2 resultados posibles, equiprobables (50/50)</li>
<li>Antes: incertidumbre total</li>
<li>Después: la incertidumbre se resuelve completamente</li>
</ul>
<blockquote>
<p>El resultado contiene exactamente <strong>1 bit</strong> de información. Una pregunta sí/no basta: &quot;¿Es cara?&quot;</p>
</blockquote>

<h1 id="%F0%9F%8E%B2-experimento-2-el-dado"><img class="emoji" draggable="false" alt="🎲" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3b2.svg" data-marp-twemoji=""/> Experimento 2: El dado</h1>
<p><strong>¿Cuánta información da el resultado de un dado?</strong></p>
<ul>
<li>6 resultados posibles, equiprobables</li>
<li>Se necesitan <strong>más preguntas</strong> para adivinarlo</li>
<li>&quot;¿Mayor que 3?&quot; → &quot;¿Mayor que 5?&quot; → ...</li>
</ul>
<blockquote>
<p>Más posibilidades = más incertidumbre = <strong>más información al resolverla</strong>.</p>
</blockquote>

<h1 id="%F0%9F%8E%B2-experimento-3-el-dado-cargado"><img class="emoji" draggable="false" alt="🎲" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3b2.svg" data-marp-twemoji=""/> Experimento 3: El dado cargado</h1>
<p><strong>¿Y si sale 6 el 90% de las veces?</strong></p>
<ul>
<li>Sale 6 → poca sorpresa → <strong>poca información</strong></li>
<li>Sale 1 → mucha sorpresa → <strong>mucha información</strong></li>
</ul>
<blockquote>
<p><strong>Los eventos raros son más informativos que los comunes.</strong></p>
</blockquote>
<p><img class="emoji" draggable="false" alt="💬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4ac.svg" data-marp-twemoji=""/> <em>&quot;Hoy salió el sol en Atacama&quot;</em> — ¿es informativo? No.<br />
<img class="emoji" draggable="false" alt="💬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4ac.svg" data-marp-twemoji=""/> <em>&quot;Hoy nevó en Atacama&quot;</em> — ¿es informativo? <strong>Mucho.</strong></p>
<p>La diferencia es la <strong>probabilidad</strong> del evento.</p>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>

<h1 id="claude-shannon-1916%E2%80%932001">Claude Shannon (1916–2001)</h1>
<ul>
<li>1948: publica <em>&quot;A Mathematical Theory of Communication&quot;</em></li>
<li>Laboratorios Bell (compañía telefónica)</li>
<li>Problema: ¿cuántos <strong>bits por segundo</strong> necesita un cable para transmitir una conversación?</li>
<li>Inventó una forma de medir la <strong>cantidad de información</strong> de cualquier fuente</li>
<li>De paso, inventó la palabra <strong>&quot;bit&quot;</strong></li>
</ul>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>

<p><strong>2.</strong> H <strong>disminuye</strong> cuando algunos resultados son más probables.<br />

<h1 id="redundancia">Redundancia</h1>
<p>Si una fuente tiene baja entropía, parte de su contenido es <strong>predecible</strong>.</p>
<p>Esa parte predecible es <strong>redundancia</strong>.</p>
<p><img class="emoji" draggable="false" alt="💬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4ac.svg" data-marp-twemoji=""/> <em>&quot;En español, después de la Q casi siempre viene una U. ¿La U aporta información?&quot;</em></p>
<p>Muy poca — porque es predecible.</p>
<blockquote>
<p>Si eliminamos la U después de Q y el receptor sabe la regla, no se pierde información. <strong>Eso es compresión.</strong></p>
</blockquote>

<h1 id="compresi%C3%B3n-la-idea-clave">Compresión: la idea clave</h1>
<p>Mensajes frecuentes → <strong>menos bits</strong><br />
Mensajes raros → <strong>más bits</strong></p>
<table>
<thead>
<tr>
<th>Especie</th>
<th>Frecuencia</th>
<th>Código fijo</th>
<th>Código variable</th>
</tr>
</thead>
<tbody>
<tr>
<td>Especie A</td>
<td>70%</td>
<td>00 (2 bits)</td>
<td>0 (1 bit)</td>
</tr>
<tr>
<td>Especie B</td>
<td>15%</td>
<td>01 (2 bits)</td>
<td>10 (2 bits)</td>
</tr>
<tr>
<td>Especie C</td>
<td>10%</td>
<td>10 (2 bits)</td>
<td>110 (3 bits)</td>
</tr>
<tr>
<td>Especie D</td>
<td>5%</td>
<td>11 (2 bits)</td>
<td>111 (3 bits)</td>
</tr>
</tbody>
</table>
<p><strong>Promedio fijo:</strong> siempre 2 bits<br />
<strong>Promedio variable:</strong> 0.7×1 + 0.15×2 + 0.1×3 + 0.05×3 = <strong>1.45 bits</strong></p>
<p><strong>Ahorro: 27.5%.</strong> Shannon demostró que el <strong>límite</strong> de compresión es exactamente H.</p>

<h1 id="el-teorema-de-shannon">El teorema de Shannon</h1>
<p><em>&quot;¿Se puede transmitir información sin errores por un canal con ruido?&quot;</em></p>
<p><strong>Sí</strong> — si la tasa de transmisión es menor que la <strong>capacidad del canal</strong> C.</p>
<blockquote>
<p><strong>Analogía ecológica:</strong> una parcela de muestreo es un &quot;canal&quot;. El ruido = error de observación. Si el protocolo es suficientemente redundante (réplicas, verificaciones), el error se elimina. Si se muestrea demasiado rápido → errores inevitables.</p>
</blockquote>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>

<h1 id="las-reglas">Las reglas</h1>
<ul>

<li>El oráculo solo responde &quot;sí&quot; o &quot;no&quot;</li>
<li><strong>Registrar cada pregunta</strong> y la respuesta en la hoja</li>
</ul>

<h1 id="la-estrategia-%C3%B3ptima">La estrategia óptima</h1>
<p>Cada pregunta debe <strong>dividir el conjunto en dos mitades iguales</strong>:</p>
<ol>
<li>&quot;¿Es un mamífero?&quot; → elimina ~mitad</li>
<li>&quot;¿Vive en el bosque?&quot; → elimina ~mitad de lo que queda</li>
<li>&quot;¿Es carnívoro?&quot; → elimina ~mitad</li>
<li>Pregunta final → identifica al animal</li>
</ol>
<blockquote>
<p><strong>Cada pregunta bien hecha vale exactamente 1 bit.</strong></p>
</blockquote>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>

<h1 id="ronda-2--b%C3%BAsqueda-binaria-15-min">Ronda 2 · Búsqueda binaria (15 min)</h1>
<p>Ahora intenten <strong>conscientemente</strong> hacer preguntas que dividan a la mitad.</p>
<p>Antes de cada pregunta piensen:<br />
<em>&quot;¿Cuántos animales descarta un 'sí'? ¿Y un 'no'?&quot;</em></p>
<p><strong>La pregunta ideal descarta la mitad.</strong></p>
<p>Anotar el número de preguntas. Comparar con la Ronda 1.</p>

<h1 id="%C2%BFpor-qu%C3%A9-en-la-ronda-3-necesitaron-menos-preguntas">¿Por qué en la Ronda 3 necesitaron menos preguntas?</h1>
<p><em>Menos incertidumbre = menos entropía. La distribución desigual hace que algunos resultados sean predecibles.</em></p>
<p><em>Es el mismo motivo por el que H' baja cuando una especie domina un ecosistema.</em></p>

<h1 id="%C2%BFqu%C3%A9-tiene-que-ver-con-la-compresi%C3%B3n-de-datos">¿Qué tiene que ver con la compresión de datos?</h1>
<p><em>Si un evento es predecible (como el pudú en la Ronda 3), necesita menos bits para transmitirlo. Esa es la base de JPEG, MP3, ZIP: dedicar menos bits a lo frecuente.</em></p>

<h1 id="lo-que-aprendimos-hoy">Lo que aprendimos hoy</h1>
<ul>
<li><strong>Información</strong> = reducción de incertidumbre. No es lo mismo que &quot;datos&quot;.</li>
<li>La <strong>entropía</strong> de Shannon mide la sorpresa promedio de una fuente.</li>
<li>La <strong>diversidad ecológica H'</strong> es la misma fórmula — mide la misma cosa.</li>
<li>La <strong>búsqueda binaria</strong> es la estrategia óptima de preguntas (1 bit por pregunta).</li>
<li>La <strong>compresión</strong> aprovecha la baja entropía: lo predecible necesita menos bits.</li>
</ul>
<footer><em>CBIT010 · Conceptos básicos de teoría de la información</em>  - Horacio Samaniego <em>(<a href="mailto:horaciosamaniego@uach.cl">horaciosamaniego@uach.cl</a>)</em></footer>
</section>
