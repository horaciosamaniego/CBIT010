<p>Con los datos del Ejercicio 1, calculen:</p>
<p><strong>Área basal</strong> del árbol:<br />
<code>π × (DAP/2)² / 10000</code> (DAP en cm → resultado en m²)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> math
area_basal = math.pi * (dap_cm / <span class="hljs-number">2</span>) ** <span class="hljs-number">2</span> / <span class="hljs-number">10000</span>
</code></pre>
<p><strong>Relación altura/diámetro:</strong><br />
<code>altura_m / (dap_cm / 100)</code></p>
<p>Muestren con f-strings y 2 decimales.</p>
